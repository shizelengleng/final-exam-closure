<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book shape -->
  <g transform="translate(256,240)" filter="url(#shadow)">
    <!-- Left page -->
    <path d="M-8,-100 L-8,80 Q-8,100 -28,100 L-100,100 L-100,-80 Q-100,-100 -80,-100 Z" fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M8,-100 L8,80 Q8,100 28,100 L100,100 L100,-80 Q100,-100 80,-100 Z" fill="white" opacity="0.85"/>
    <!-- Spine -->
    <rect x="-8" y="-100" width="16" height="200" rx="4" fill="white" opacity="0.7"/>
    <!-- Text lines on left page -->
    <rect x="-80" y="-70" width="56" height="6" rx="3" fill="url(#accent)" opacity="0.6"/>
    <rect x="-80" y="-52" width="48" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="-80" y="-34" width="52" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="-80" y="-16" width="40" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="-80" y="2" width="44" height="6" rx="3" fill="url(#accent)" opacity="0.5"/>
    <rect x="-80" y="20" width="36" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="-80" y="38" width="50" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="-80" y="56" width="32" height="6" rx="3" fill="#667eea" opacity="0.3"/>
    <!-- Text lines on right page -->
    <rect x="24" y="-70" width="52" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="24" y="-52" width="44" height="6" rx="3" fill="url(#accent)" opacity="0.5"/>
    <rect x="24" y="-34" width="48" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="24" y="-16" width="40" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="24" y="2" width="56" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="24" y="20" width="36" height="6" rx="3" fill="url(#accent)" opacity="0.5"/>
    <rect x="24" y="38" width="48" height="6" rx="3" fill="#667eea" opacity="0.4"/>
    <rect x="24" y="56" width="42" height="6" rx="3" fill="#667eea" opacity="0.3"/>
  </g>
  <!-- AI sparkle accent -->
  <g transform="translate(370,120)">
    <path d="M0,-24 L6,-8 L22,-6 L8,4 L12,20 L0,10 L-12,20 L-8,4 L-22,-6 L-6,-8 Z" fill="url(#accent)" opacity="0.9"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(140,140) scale(0.5)">
    <path d="M0,-20 L5,-7 L18,-5 L7,3 L10,17 L0,9 L-10,17 L-7,3 L-18,-5 L-5,-7 Z" fill="white" opacity="0.6"/>
  </g>
</svg>
